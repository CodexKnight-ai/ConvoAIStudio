version: "3.9"

networks:
  convo-network:
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:16
    container_name: convo-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - convo-network

  redis:
    image: redis:7
    container_name: convo-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - convo-network

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:4001
      AUTH_SERVICE_GRPC_URL: auth-service:50051
      PODCAST_SERVICE_URL: http://podcast-service:4002
    depends_on:
      - auth-service
      - podcast-service
    networks:
      - convo-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/auth_db
      REDIS_DB: 0
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    expose:
      - "4001"
      - "50051"
    networks:
      - convo-network

  podcast-service:
    build:
      context: ./services/podcast-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/podcast_db
      REDIS_DB: 1
      REDIS_URL: redis://redis:6379
      AI_ENGINE_GRPC_URL: ai-engine:50052
    depends_on:
      - postgres
      - redis
      - ai-engine
    expose:
      - "4002"
    networks:
      - convo-network

  ai-engine:
    build:
      context: ./services/ai_engine
      dockerfile: Dockerfile
    depends_on:
      - redis
    expose:
      - "50052"
    networks:
      - convo-network

  realtime-service:
    build:
      context: ./services/realtime-service
      dockerfile: Dockerfile
    environment:
      PORT: 4003
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    ports:
      - "4003:4003"
    networks:
      - convo-network