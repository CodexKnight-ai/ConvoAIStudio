services:
  postgres:
    image: postgres:16
    container_name: convo-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: convo_ai_studio
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: convo-redis
    restart: always

    ports:
      - "6379:6379"

volumes:
  postgres_data: